<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA Tools</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, 'Inter', sans-serif;
        }

        body {
            background: #0f1115;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        h1 {
            color: #f8fafc;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        p {
            color: #64748b;
            margin-bottom: 40px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }

        a {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 24px 28px;
            text-decoration: none;
            color: #f8fafc;
            transition: background 0.2s, transform 0.2s;
        }

        a:hover {
            background: rgba(79, 70, 229, 0.15);
            border-color: #4f46e5;
            transform: translateY(-2px);
        }

        a h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        a p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>

<body>
    <h1>HSA Tools</h1>
    <p>Select a tool to continue</p>
    <div class="cards">
        <a href="/drilling_tool_app/">
            <h2>🔧 Drilling Tool Form</h2>
            <p>Submit drilling tool details with photo and status</p>
        </a>
        <a href="/rig_form_app/">
            <h2>🛢️ Rig Selection Form</h2>
            <p>Select rig number and footage range</p>
        </a>
    </div>
</body>

</html>
